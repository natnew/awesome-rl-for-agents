name: Links

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/links.yml"
      - ".lycheeignore"
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/links.yml"
      - ".lycheeignore"
  schedule:
    # Weekly link rot sweep, Mondays 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --accept 200,206,429
            './**/*.md'
          fail: true
