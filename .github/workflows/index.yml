name: Index

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "data/resources.json"
      - "scripts/build_index.py"
      - ".github/workflows/index.yml"
  pull_request:
    paths:
      - "README.md"
      - "data/resources.json"
      - "scripts/build_index.py"
      - ".github/workflows/index.yml"

permissions:
  contents: read

jobs:
  check-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify README and index are in sync
        run: python scripts/build_index.py --check
